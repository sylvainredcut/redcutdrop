services:
  redcut-drop:
    build: .
    container_name: redcut-drop
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
      - dbdata:/app/data
      - tokendata:/app/.token-vol
      - storage:/app/storage
    restart: unless-stopped
    networks:
      - web

volumes:
  uploads:
  dbdata:
  tokendata:
  storage:

networks:
  web:
    external: true
