<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Redcut</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="/img/logo.png" alt="Redcut" class="logo-img" style="height:40px">
        <span class="logo-text">Upload Redcut</span>
      </div>
      <div class="header-right">
        <span id="userName" class="user-name"></span>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Deconnexion</button>
      </div>
    </div>
  </header>

  <main>
    <div class="upload-card">
      <h1>Envoyer une video</h1>
      <p class="subtitle">La video sera upload automatiquement vers Frame.io dans le dossier client correspondant.</p>

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button type="button" class="mode-tab active" data-mode="revision">Revision</button>
        <button type="button" class="mode-tab" data-mode="publish">Mise en ligne</button>
      </div>

      <form id="uploadForm">
        <!-- REVISION MODE fields -->
        <div id="revisionFields">
          <div class="field">
            <label for="clientSelect">Client</label>
            <select id="clientSelect">
              <option value="">Chargement des clients...</option>
            </select>
          </div>

          <div class="field">
            <label for="weekSelect">Semaine</label>
            <select id="weekSelect">
              <option value="">Selectionner une semaine...</option>
            </select>
          </div>
        </div>

        <!-- PUBLISH MODE fields -->
        <div id="publishFields" style="display:none">
          <div class="field">
            <label for="brandSelect">Marque</label>
            <select id="brandSelect">
              <option value="">Chargement des marques...</option>
            </select>
          </div>

          <div class="field">
            <label for="publishClientSelect">Archivage Frame.io <span class="hint">(optionnel)</span></label>
            <select id="publishClientSelect">
              <option value="">Pas d'archivage Frame.io</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="commentInput">Commentaire <span class="hint">(optionnel, 100 car. max)</span></label>
          <input type="text" id="commentInput" maxlength="100" placeholder="Ex : React YouTube Anavi V3">
        </div>

        <div class="field">
          <label id="fileLabel">Fichiers video <span class="hint" id="fileHint">(3 max)</span></label>
          <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept="video/*,.mxf,.mts,.m2ts,.prores,.r3d,.braw" multiple hidden>
            <div class="dropzone-inner" id="dropzoneInner">
              <svg class="drop-icon" width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path d="M24 8V32M24 8L16 16M24 8L32 16" stroke="#e63946" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 36H40" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
              <p class="drop-text">Glissez vos videos ici</p>
              <p class="drop-sub">ou <button type="button" class="link-btn" id="browseBtn">parcourir</button></p>
              <p class="drop-formats">MP4, MOV, MXF, ProRes, R3D, BRAW...</p>
            </div>
            <div id="fileList" class="file-list"></div>
          </div>
        </div>

        <div id="progressSection" style="display:none">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">Upload en cours...</p>
        </div>

        <div id="uploadError" class="error-msg" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-full" id="uploadBtn" disabled>
          Envoyer vers Frame.io
        </button>
      </form>

      <div id="successPanel" class="success-panel" style="display:none">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" fill="#dcfce7"/>
          <path d="M15 24l7 7 11-14" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 id="successTitle">Upload reussi !</h2>
        <p id="successMsg"></p>
        <a id="shareLink" class="btn btn-outline" href="#" target="_blank">Voir et commenter sur Frame.io</a>
        <button class="btn btn-ghost" id="resetBtn">Nouvel upload</button>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
